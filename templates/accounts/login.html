<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Mobix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .login-container {
            max-width: 450px;
            margin-top: 100px;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .btn-primary {
            background-color: #0d6efd;
            border: none;
            border-radius: 8px;
        }
        .btn-primary:hover {
            background-color: #0b5ed7;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="login-container w-100">
        <div class="card p-4">
            <div class="card-body">
                <h3 class="card-title text-center mb-4 fw-bold text-dark">Login</h3>
                
                <form method="POST">
                    {% csrf_token %} {% if form.errors %}
                        <div class="alert alert-danger p-2" role="alert">
                            Invalid username or password!
                        </div>
                    {% endif %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label text-secondary">Username</label>
                        <input type="text" name="username" id="id_username" class="form-control p-2.5" placeholder="Enter your username" required>
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label text-secondary">Password</label>
                        <input type="password" name="password" id="id_password" class="form-control p-2.5" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 p-2.5 fw-bold mb-3">Login</button>
                </form>

                <div class="text-center">
                    <p class="small text-muted mb-0">Don't have an account? 
                        <a href="{% url 'register' %}" class="text-decoration-none fw-bold">Register here</a>
                    </p>
                    <hr class="text-muted">
                    <a href="/" class="small text-secondary text-decoration-none">← Back to Home</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
