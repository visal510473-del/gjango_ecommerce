<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - E-Mobix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .register-container { max-width: 450px; margin-top: 60px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); }
        
        /* តម្រៀបប្រអប់បញ្ចូលឱ្យស្អាត */
        .card-body input {
            display: block; 
            width: 100%; 
            padding: 0.4rem 0.75rem;
            font-size: 1rem; 
            border: 1px solid #ced4da; 
            border-radius: 0.375rem;
            margin-bottom: 15px;
        }
        /* លាក់អក្សរការពន្យល់វែងៗរញ៉េរញ៉ៃចោល */
        .card-body .helptext { display: none; }
        
        /* បង្ហាញអក្សរប្រាប់កំហុសឱ្យច្បាស់ៗ និងស្អាត */
        .errorlist {
            list-style: none;
            padding-left: 0;
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: -10px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="register-container w-100">
        <div class="card p-4">
            <div class="card-body">
                <h3 class="card-title text-center mb-4 fw-bold text-dark">Create a new account</h3>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    {% if form.non_field_errors %}
                        <div class="alert alert-danger p-2" role="alert">
                            {% for error in form.non_field_errors %}
                                <p class="mb-0 small">⚠️ {{ error }}</p>
                            {% endfor %}
                        </div>
                    {% endif %}

                    <div>
                        {% for field in form %}
                            <label class="form-label text-secondary small fw-bold">{{ field.label }}</label>
                            {{ field }}
                            
                            {% if field.errors %}
                                {{ field.errors }}
                            {% endif %}
                        {% endfor %}
                    </div>

                    <button type="submit" class="btn btn-success w-100 p-2.5 fw-bold mb-3 mt-2">Create account</button>
                </form>

                <div class="text-center">
                    <p class="small text-muted mb-0">Already have an account? 
                        <a href="{% url 'login' %}" class="text-decoration-none fw-bold">Log in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
